<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #fcfcfc;
        padding-top: 50px;
      }
      .card {
        border-radius: 0;
        border: 1px solid #ddd;
      }
      .card-header {
        background-color: #fff;
        font-weight: bold;
        border-bottom: 1px solid #ddd;
      }
      .btn-primary {
        border-radius: 4px;
      }
      .list-group-item {
        border-radius: 0 !important;
      }
      .delete-item {
        color: #0d6efd;
        cursor: pointer;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card mb-4">
        <h3 class="card-header">Todo List Sayfası</h3>
        <div class="card-body">
          <form id="to-doAddForm">
            <input
              type="text"
              id="todoInput"
              class="form-control mb-3"
              placeholder="Todo Giriniz"
            />
            <button class="btn btn-primary" id="addTodoBtn">
              Todo Ekleyin
            </button>
          </form>
        </div>
      </div>

      <div class="card">
        <h3 class="card-header">Todo Listesi</h3>
        <div class="card-body">
          <form id="to-doSearchForm" class="test">
            <input
              type="text"
              id="filterInput"
              class="form-control mb-3"
              placeholder="Arayın"
            />
          </form>
          <ul class="list-group mb-3" id="todoList"></ul>

          <button class="btn btn-primary" id="clearAllBtn">
            Tüm Todoları Temizle
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
