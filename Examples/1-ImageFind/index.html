<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resim Arama Kartı</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .search-card {
        max-width: 1350px;
        width: 100%;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
      .card-title-green {
        color: #198754;
        font-weight: bold;
        margin-bottom: 1.5rem;
      }
      .imageListWrapper {
        margin-top: 20px;
        padding: 10px;
        max-height: 80vh;
        overflow-y: auto;
      }
      .col .card {
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .col .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(25, 135, 84, 0.2) !important;
      }
    </style>
  </head>
  <body>
    <div class="card search-card p-4">
      <div class="card-body">
        <h2 class="text-center card-title-green">Resim Arama</h2>

        <div class="mb-4">
          <input
            type="text"
            class="form-control border-success"
            placeholder="Aramak istediğiniz kelimeyi yazın..."
            aria-label="Arama"
          />
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-success flex-fill" id="searchButton">
            <i class="bi bi-search"></i> Ara
          </button>
          <button class="btn btn-outline-success flex-fill" id="clearButton">
            Temizle
          </button>
        </div>
      </div>
      <div class="imageListWrapper container-fluid mt-4">
        <div
          id="imageList"
          class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-3"
        ></div>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
