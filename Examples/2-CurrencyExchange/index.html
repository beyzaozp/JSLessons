<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f2f5;
        height: 100vh;
        display: flex;
        align-items: center;
      }
      .currency-card {
        max-width: 500px;
        margin: auto;
        border: none;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .result-area {
        background-color: #e8f5e9;
        border-radius: 10px;
        padding: 20px;
        font-weight: bold;
        color: #2e7d32;
      }
    </style>
  </head>
  <body>
    <div class="card currency-card p-4">
      <h2 class="text-center text-success mb-4 font-weight-bold">
        Döviz Çevirici
      </h2>

      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Miktar</label>
          <input
            type="number"
            id="amount"
            class="form-control form-control-lg border-success"
            value="1"
          />
        </div>

        <div class="row mb-4">
          <div class="col-5">
            <select id="firstCurrency" class="form-select border-success">
              <option value="USD" selected>USD</option>
              <option value="EUR">EUR</option>
              <option value="TRY">TRY</option>
              <option value="GBP">GBP</option>
            </select>
          </div>

          <div class="col-2 text-center align-self-center fs-4 text-success">
            ⇄
          </div>

          <div class="col-5">
            <select id="secondCurrency" class="form-select border-success">
              <option value="TRY" selected>TRY</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </div>
        </div>

        <div class="result-area text-center mb-4">
          <span id="resultText">0.00</span>
          <span id="secondCurrencySymbol">TRY</span>
        </div>

        <button id="convertBtn" class="btn btn-success w-100 btn-lg shadow-sm">
          Hesapla
        </button>
      </div>
    </div>
    <script src="currency.js"></script>
    <script src="app.js"></script>
  </body>
</html>
